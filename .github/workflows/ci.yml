name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test
        run: node --test
      - name: Regenerate and verify committed artifacts
        run: |
          node build/build.js
          git diff --exit-code
      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies
      - name: Upload vsix
        uses: actions/upload-artifact@v4
        with:
          name: terminal-workbench-vsix
          path: "*.vsix"
