name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Test
        run: node --test
      - name: Regenerate and verify committed artifacts
        run: |
          node build/build.js
          git diff --exit-code
      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies
      - name: Create or update release with vsix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes *.vsix || gh release upload "${GITHUB_REF_NAME}" *.vsix --clobber
